<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track League Negotiation Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .game-board {
            display: none;
        }

        .game-board.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            height: 8px;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: white;
            height: 100%;
            transition: width 0.3s ease;
        }

        .round-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            font-weight: bold;
            color: #333;
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            min-height: 25px;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #667eea;
            color: white;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        .offer-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .end-game {
            display: none;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .end-game.active {
            display: block;
        }

        .end-game h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .end-game p {
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏁 Track League Negotiation Simulator</h1>

        <div id="startScreen">
            <button class="start-btn" onclick="startGame()">Start New Game</button>
        </div>

        <div id="gameArea" class="game-board">
            <div class="round-info">
                Round <span id="round">1</span> / <span id="maxRounds">6</span>
            </div>

            <div id="message" class="message" style="display: none;"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Trust</div>
                    <div class="stat-value" id="trust">50</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="trustBar" style="width: 50%"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Investor Confidence</div>
                    <div class="stat-value" id="investorConfidence">50</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="investorBar" style="width: 50%"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Athlete Support</div>
                    <div class="stat-value" id="athleteSupport">50</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="athleteBar" style="width: 50%"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Debt</div>
                    <div class="stat-value" id="debt">$40.7M</div>
                </div>
            </div>

            <div class="offer-input">
                <input type="number" id="offerAmount" placeholder="Enter offer amount" min="0" step="1000000">
                <button onclick="makeOffer()">Make Offer</button>
            </div>

            <div class="actions">
                <button onclick="performAction('ask_questions')">📚 Ask Questions</button>
                <button onclick="performAction('package_deal')">📦 Package Deal</button>
                <button onclick="performAction('appeal_athletes')">🏅 Appeal to Athletes</button>
                <button onclick="performAction('appeal_investors')">💰 Appeal to Investors</button>
                <button class="danger" onclick="performAction('walk_away')">✈️ Walk Away (BATNA)</button>
                <button class="secondary" onclick="performAction('next_round')">📅 Next Round</button>
            </div>
        </div>

        <div id="endGame" class="end-game">
            <h2 id="endMessage"></h2>
            <p id="endDetails"></p>
            <button class="start-btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        async function startGame() {
            try {
                const response = await fetch('/api/start', { method: 'POST' });
                const data = await response.json();
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('endGame').classList.remove('active');
                document.getElementById('gameArea').classList.add('active');
                updateUI(data);
            } catch (error) {
                console.error('Error starting game:', error);
            }
        }

        async function performAction(action) {
            try {
                const response = await fetch('/api/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                const data = await response.json();
                updateUI(data.state);
                showMessage(data.message, 'info');
                
                if (data.state.deal_made || data.state.round > data.state.max_rounds) {
                    endGame(data.state);
                }
            } catch (error) {
                console.error('Error performing action:', error);
            }
        }

        function makeOffer() {
            const offer = parseInt(document.getElementById('offerAmount').value);
            if (isNaN(offer) || offer <= 0) {
                showMessage('Please enter a valid offer amount', 'error');
                return;
            }
            performAction('offer');
            document.getElementById('offerAmount').value = '';
        }

        function updateUI(state) {
            document.getElementById('round').textContent = state.round;
            document.getElementById('trust').textContent = state.trust;
            document.getElementById('investorConfidence').textContent = state.investor_confidence;
            document.getElementById('athleteSupport').textContent = state.athlete_support;
            document.getElementById('debt').textContent = '$' + (state.debt / 1_000_000).toFixed(1) + 'M';

            document.getElementById('trustBar').style.width = Math.min(state.trust, 100) + '%';
            document.getElementById('investorBar').style.width = Math.min(state.investor_confidence, 100) + '%';
            document.getElementById('athleteBar').style.width = Math.min(state.athlete_support, 100) + '%';
        }

        function showMessage(message, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function endGame(state) {
            const endDiv = document.getElementById('endGame');
            const endMessage = document.getElementById('endMessage');
            const endDetails = document.getElementById('endDetails');

            if (state.deal_made) {
                endMessage.textContent = '🎉 Success!';
                endDetails.textContent = `You acquired the league in round ${state.round}!`;
            } else {
                endMessage.textContent = '❌ Negotiation Failed';
                endDetails.textContent = `The negotiation window closed at round ${state.max_rounds}.`;
            }

            document.getElementById('gameArea').classList.remove('active');
            endDiv.classList.add('active');
        }
    </script>
</body>
</html>
